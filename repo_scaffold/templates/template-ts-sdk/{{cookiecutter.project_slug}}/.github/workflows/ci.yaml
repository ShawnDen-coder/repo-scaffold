name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

{% include '_shared/steps/pnpm-setup.yaml' %}

      - name: Type check
        run: pnpm typecheck

      - name: Build
        run: pnpm build
