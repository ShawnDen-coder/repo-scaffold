ignore_merge_commits = true
branch_whitelist = ["master", "main"]
skip_ci = "[skip ci]"

pre_bump_hooks = [
    "uv version {% raw %}{{version}}{% endraw %}",
    "uv lock --no-upgrade",
]

post_bump_hooks = [
    "git push",
    "git push origin {% raw %}{{version}}{% endraw %}",
]

[changelog]
path = "CHANGELOG.md"
template = "remote"
remote = "github.com"
owner = "{{cookiecutter.github_username}}"
repository = "{{cookiecutter.project_slug}}"
