name: ✅ Code Quality & Tests
on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  {% raw %}group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}{% endraw %}
env:
  {% raw %}UV_INDEX_HOMELAB_USERNAME: ${{ secrets.PYPI_SERVER_USERNAME }}
  UV_INDEX_HOMELAB_PASSWORD: ${{ secrets.PYPI_SERVER_PASSWORD }}
  PYPI_SERVER_USERNAME: ${{ secrets.PYPI_SERVER_USERNAME }}
  PYPI_SERVER_PASSWORD: ${{ secrets.PYPI_SERVER_PASSWORD }}{% endraw %}
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dev environment
        run: uvx --from rust-just just init
      - name: Run ruff
        run: uvx --from rust-just just lint
      - name: Run pre-commit hooks
        run: uvx --from rust-just just lint-pre-commit

  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: [{% set min_minor = cookiecutter.min_python_version.split('.')[1]|int %}{% set max_minor = cookiecutter.max_python_version.split('.')[1]|int %}{% for minor in range(min_minor, max_minor + 1) %}"3.{{ minor }}"{% if not loop.last %}, {% endif %}{% endfor %}]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          {% raw %}python-version: ${{ matrix.python-version }}{% endraw %}
      - name: Sync dev deps
        {% raw %}run: uv sync --all-extras --python ${{ matrix.python-version }}{% endraw %}
      - name: Run tests
        {% raw %}run: uvx --from rust-just just test-version ${{ matrix.python-version }}{% endraw %}
{%- if cookiecutter.use_podman == 'yes' %}

  container-build-test:
    name: 🐳 Multi-platform Container Build Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Dockerfile presence
        id: dockerfile-check
        run: |
          if [ -f "./container/Dockerfile" ]; then
            echo "dockerfile-exists=true" >> $GITHUB_OUTPUT
          else
            echo "dockerfile-exists=false" >> $GITHUB_OUTPUT
          fi
      - name: Set up QEMU
        if: steps.dockerfile-check.outputs.dockerfile-exists == 'true'
        uses: docker/setup-qemu-action@v3
      - name: Test build container image
        if: steps.dockerfile-check.outputs.dockerfile-exists == 'true'
        uses: redhat-actions/buildah-build@v2
        with:
          {% raw %}image: ${{ github.repository }}-test
          tags: test-${{ github.sha }}{% endraw %}
          containerfiles: ./container/Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |-
            {% raw %}PYPI_SERVER_USERNAME=${{ env.PYPI_SERVER_USERNAME }}
            PYPI_SERVER_PASSWORD=${{ env.PYPI_SERVER_PASSWORD }}{% endraw %}
{%- endif %}
