ignore_merge_commits = true

[changelog]
path = "CHANGELOG.md"

[pre_bump_hooks]
# Update the package version before creating the tag
"pnpm --dir . version {% raw %}{{version}}{% endraw %} --no-git-tag-version" = []

[post_bump_hooks]
"git push" = []
"git push origin {% raw %}{{version}}{% endraw %}" = []
