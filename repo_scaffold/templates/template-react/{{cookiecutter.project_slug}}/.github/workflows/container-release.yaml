name: 🐳 Container Release
on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
permissions:
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          {% raw %}username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}{% endraw %}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: container/Dockerfile
          push: true
          {% raw %}tags: ghcr.io/${{ github.repository }}:${{ github.ref_name }}{% endraw %}
